# ============================================================
# CyberSentinel AI - Main Configuration
# AI-Agentic Cybersecurity Framework
# ============================================================
# Copy this file and set your actual values.
# Never commit secrets to version control.
# Use environment variables for sensitive values.
# ============================================================

# ─────────────────────────────────────────────
# LLM Configuration
# ─────────────────────────────────────────────
llm:
  provider: "openai"          # openai | anthropic | azure_openai | local
    model: "gpt-4o"             # GPT-4o, claude-3-7-sonnet, gpt-4-turbo
      temperature: 0.1            # Low temperature for precise security reasoning
        max_tokens: 4096
          timeout: 60                 # Seconds
            retry_attempts: 3
              fallback_model: "gpt-4-turbo"  # Fallback if primary unavailable

                # Azure OpenAI (if provider = azure_openai)
                  azure:
                      endpoint: "${AZURE_OPENAI_ENDPOINT}"
                          api_version: "2024-05-01-preview"
                              deployment: "gpt-4o"

                              # ─────────────────────────────────────────────
                              # Agent Configuration
                              # ─────────────────────────────────────────────
                              agents:

                                sentinel:
                                    enabled: true
                                        alert_threshold: 7.0       # Minimum risk score to escalate (0-10)
                                            mitre_mapping: true        # Enable automatic MITRE ATT&CK mapping
                                                max_iocs_per_alert: 20     # Maximum IOCs to extract per alert
                                                    deduplication_window: 300  # Seconds - deduplicate similar alerts
                                                        batch_size: 50             # Process alerts in batches

                                                          hunter:
                                                              enabled: true
                                                                  hunt_interval: 3600        # Seconds between autonomous hunts (1 hour)
                                                                      max_hunt_duration: 1800    # Maximum hunt duration in seconds
                                                                          ti_feeds:                  # Threat intelligence feeds to query
                                                                                - virustotal
                                                                                      - shodan
                                                                                            - misp
                                                                                                  - otx_alienvault
                                                                                                      hypothesis_templates:      # Pre-built hunt hypotheses
                                                                                                            - "Detect DNS tunneling C2 beaconing"
                                                                                                                  - "Identify lateral movement via WMI"
                                                                                                                        - "Find credential dumping activity"
                                                                                                                              - "Detect ransomware staging behavior"
                                                                                                                                    - "Identify data exfiltration patterns"
                                                                                                                                    
                                                                                                                                      responder:
                                                                                                                                          enabled: true
                                                                                                                                              auto_contain: false        # WARNING: Set true only in fully trusted environments
                                                                                                                                                  human_approval_threshold: 9.0  # Risk score requiring human approval
                                                                                                                                                      max_actions_per_incident: 10   # Maximum automated actions per incident
                                                                                                                                                          playbook_directory: "./playbooks"
                                                                                                                                                              notification:
                                                                                                                                                                    slack_webhook: "${SLACK_WEBHOOK_URL}"
                                                                                                                                                                          pagerduty_key: "${PAGERDUTY_INTEGRATION_KEY}"
                                                                                                                                                                                email_recipients:
                                                                                                                                                                                        - "soc@company.com"
                                                                                                                                                                                                - "ciso@company.com"
                                                                                                                                                                                                
                                                                                                                                                                                                  vulnerability:
                                                                                                                                                                                                      enabled: true
                                                                                                                                                                                                          scan_interval: 86400       # Daily scans (seconds)
                                                                                                                                                                                                              epss_threshold: 0.5        # EPSS score threshold for critical priority
                                                                                                                                                                                                                  cvss_threshold: 7.0        # CVSS score threshold for high priority
                                                                                                                                                                                                                      auto_ticket: true          # Auto-create tickets for critical CVEs
                                                                                                                                                                                                                      
                                                                                                                                                                                                                        orchestrator:
                                                                                                                                                                                                                            recursion_limit: 25        # Maximum agent reasoning steps
                                                                                                                                                                                                                                timeout: 300               # Overall incident processing timeout (seconds)
                                                                                                                                                                                                                                    memory_ttl: 86400          # Incident memory retention (24 hours)
                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                    # ─────────────────────────────────────────────
                                                                                                                                                                                                                                    # SIEM Integrations
                                                                                                                                                                                                                                    # ─────────────────────────────────────────────
                                                                                                                                                                                                                                    integrations:
                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                      siem:
                                                                                                                                                                                                                                          provider: "splunk"         # splunk | elastic | sentinel | qradar
                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                              splunk:
                                                                                                                                                                                                                                                    host: "${SPLUNK_HOST}"
                                                                                                                                                                                                                                                          port: 8089
                                                                                                                                                                                                                                                                username: "${SPLUNK_USERNAME}"
                                                                                                                                                                                                                                                                      password: "${SPLUNK_PASSWORD}"
                                                                                                                                                                                                                                                                            verify_ssl: true
                                                                                                                                                                                                                                                                                  index: "main"
                                                                                                                                                                                                                                                                                        alert_index: "notable"
                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                            elastic:
                                                                                                                                                                                                                                                                                                  host: "${ELASTIC_HOST:-localhost}"
                                                                                                                                                                                                                                                                                                        port: 9200
                                                                                                                                                                                                                                                                                                              username: "${ELASTIC_USERNAME}"
                                                                                                                                                                                                                                                                                                                    password: "${ELASTIC_PASSWORD}"
                                                                                                                                                                                                                                                                                                                          index_pattern: "logs-*"
                                                                                                                                                                                                                                                                                                                                alert_index: "security-alerts-*"
                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                    sentinel:
                                                                                                                                                                                                                                                                                                                                          workspace_id: "${AZURE_SENTINEL_WORKSPACE_ID}"
                                                                                                                                                                                                                                                                                                                                                workspace_key: "${AZURE_SENTINEL_WORKSPACE_KEY}"
                                                                                                                                                                                                                                                                                                                                                      subscription_id: "${AZURE_SUBSCRIPTION_ID}"
                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                        # EDR/XDR
                                                                                                                                                                                                                                                                                                                                                          edr:
                                                                                                                                                                                                                                                                                                                                                              provider: "crowdstrike"    # crowdstrike | sentinelone | defender
                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                  crowdstrike:
                                                                                                                                                                                                                                                                                                                                                                        client_id: "${CROWDSTRIKE_CLIENT_ID}"
                                                                                                                                                                                                                                                                                                                                                                              client_secret: "${CROWDSTRIKE_CLIENT_SECRET}"
                                                                                                                                                                                                                                                                                                                                                                                    base_url: "https://api.crowdstrike.com"
                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                      # SOAR
                                                                                                                                                                                                                                                                                                                                                                                        soar:
                                                                                                                                                                                                                                                                                                                                                                                            provider: "xsoar"          # xsoar | splunk_soar | ibm_resilient
                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                xsoar:
                                                                                                                                                                                                                                                                                                                                                                                                      host: "${XSOAR_HOST}"
                                                                                                                                                                                                                                                                                                                                                                                                            api_key: "${XSOAR_API_KEY}"
                                                                                                                                                                                                                                                                                                                                                                                                                  verify_ssl: true
                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                    # Threat Intelligence
                                                                                                                                                                                                                                                                                                                                                                                                                      threat_intel:
                                                                                                                                                                                                                                                                                                                                                                                                                          virustotal:
                                                                                                                                                                                                                                                                                                                                                                                                                                api_key: "${VIRUSTOTAL_API_KEY}"
                                                                                                                                                                                                                                                                                                                                                                                                                                      rate_limit: 4            # Requests per minute (free tier)
                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                          shodan:
                                                                                                                                                                                                                                                                                                                                                                                                                                                api_key: "${SHODAN_API_KEY}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                    misp:
                                                                                                                                                                                                                                                                                                                                                                                                                                                          host: "${MISP_HOST}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                api_key: "${MISP_API_KEY}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      verify_ssl: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          otx_alienvault:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                api_key: "${OTX_API_KEY}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # Ticketing
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ticketing:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        provider: "jira"           # jira | servicenow | pagerduty
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            jira:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  server: "${JIRA_SERVER}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        username: "${JIRA_USERNAME}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              api_token: "${JIRA_API_TOKEN}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    project_key: "SOC"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          issue_type: "Security Incident"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              servicenow:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    instance: "${SERVICENOW_INSTANCE}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          username: "${SERVICENOW_USERNAME}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                password: "${SERVICENOW_PASSWORD}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # Cloud Security
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    cloud:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        aws:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              region: "us-east-1"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    access_key_id: "${AWS_ACCESS_KEY_ID}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          secret_access_key: "${AWS_SECRET_ACCESS_KEY}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                security_hub_enabled: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    azure:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          subscription_id: "${AZURE_SUBSCRIPTION_ID}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                tenant_id: "${AZURE_TENANT_ID}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      client_id: "${AZURE_CLIENT_ID}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            client_secret: "${AZURE_CLIENT_SECRET}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # Database Configuration
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            database:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              url: "${DATABASE_URL:-postgresql+asyncpg://sentinel:sentinel_pass@localhost:5432/cybersentinel}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                pool_size: 10
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  max_overflow: 20
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    pool_timeout: 30
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    cache:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      url: "${REDIS_URL:-redis://localhost:6379/0}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ttl: 3600                    # Default cache TTL (seconds)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # API Configuration
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        api:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          host: "0.0.0.0"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            port: 8000
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              workers: 4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                cors_origins:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - "http://localhost:3000"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - "http://localhost:8501"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          rate_limit: 1000             # Requests per minute per client
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            jwt_secret: "${JWT_SECRET}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              jwt_expiry: 3600             # Token expiry in seconds
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # Logging & Observability
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              logging:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                level: "INFO"                # DEBUG | INFO | WARNING | ERROR | CRITICAL
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  format: "json"               # json | text
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    file: "./logs/cybersentinel.log"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      max_size: "100MB"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        backup_count: 10
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        observability:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          prometheus:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              enabled: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  port: 8001
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    opentelemetry:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        enabled: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            endpoint: "${OTEL_ENDPOINT:-http://localhost:4317}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                service_name: "cybersentinel-ai"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # Security Settings
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                security:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  vault:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      enabled: false
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          addr: "${VAULT_ADDR}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              token: "${VAULT_TOKEN}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                tls:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    enabled: false
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        cert: "./certs/server.crt"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            key: "./certs/server.key"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              rbac:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  enabled: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      roles:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - analyst
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - senior_analyst
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - soc_manager
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - admin

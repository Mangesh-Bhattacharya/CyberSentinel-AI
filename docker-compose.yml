# ============================================================
# CyberSentinel AI - Docker Compose Stack
# AI-Agentic Cybersecurity Platform
# ============================================================

version: '3.9'

services:

  # ─────────────────────────────────────────
    # CyberSentinel AI Core API
      # ─────────────────────────────────────────
        cybersentinel:
            build:
                  context: .
                        dockerfile: Dockerfile
                            container_name: cybersentinel-api
                                restart: unless-stopped
                                    ports:
                                          - "8000:8000"
                                              environment:
                                                    - CYBERSENTINEL_CONFIG=/app/config.yaml
                                                          - OPENAI_API_KEY=${OPENAI_API_KEY}
                                                                - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
                                                                      - DATABASE_URL=postgresql+asyncpg://sentinel:sentinel_pass@postgres:5432/cybersentinel
                                                                            - REDIS_URL=redis://redis:6379/0
                                                                                  - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
                                                                                        - LOG_LEVEL=INFO
                                                                                            volumes:
                                                                                                  - ./config.yaml:/app/config.yaml:ro
                                                                                                        - sentinel_logs:/app/logs
                                                                                                            depends_on:
                                                                                                                  postgres:
                                                                                                                          condition: service_healthy
                                                                                                                                redis:
                                                                                                                                        condition: service_healthy
                                                                                                                                            networks:
                                                                                                                                                  - sentinel_network
                                                                                                                                                      healthcheck:
                                                                                                                                                            test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
                                                                                                                                                                  interval: 30s
                                                                                                                                                                        timeout: 10s
                                                                                                                                                                              retries: 3
                                                                                                                                                                              
                                                                                                                                                                                # ─────────────────────────────────────────
                                                                                                                                                                                  # SOC Dashboard (Streamlit)
                                                                                                                                                                                    # ─────────────────────────────────────────
                                                                                                                                                                                      dashboard:
                                                                                                                                                                                          build:
                                                                                                                                                                                                context: .
                                                                                                                                                                                                      dockerfile: Dockerfile.dashboard
                                                                                                                                                                                                          container_name: cybersentinel-dashboard
                                                                                                                                                                                                              restart: unless-stopped
                                                                                                                                                                                                                  ports:
                                                                                                                                                                                                                        - "8501:8501"
                                                                                                                                                                                                                            environment:
                                                                                                                                                                                                                                  - API_URL=http://cybersentinel:8000
                                                                                                                                                                                                                                        - STREAMLIT_SERVER_PORT=8501
                                                                                                                                                                                                                                            depends_on:
                                                                                                                                                                                                                                                  - cybersentinel
                                                                                                                                                                                                                                                      networks:
                                                                                                                                                                                                                                                            - sentinel_network
                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                              # ─────────────────────────────────────────
                                                                                                                                                                                                                                                                # PostgreSQL Database
                                                                                                                                                                                                                                                                  # ─────────────────────────────────────────
                                                                                                                                                                                                                                                                    postgres:
                                                                                                                                                                                                                                                                        image: postgres:16-alpine
                                                                                                                                                                                                                                                                            container_name: cybersentinel-postgres
                                                                                                                                                                                                                                                                                restart: unless-stopped
                                                                                                                                                                                                                                                                                    ports:
                                                                                                                                                                                                                                                                                          - "5432:5432"
                                                                                                                                                                                                                                                                                              environment:
                                                                                                                                                                                                                                                                                                    POSTGRES_USER: sentinel
                                                                                                                                                                                                                                                                                                          POSTGRES_PASSWORD: sentinel_pass
                                                                                                                                                                                                                                                                                                                POSTGRES_DB: cybersentinel
                                                                                                                                                                                                                                                                                                                    volumes:
                                                                                                                                                                                                                                                                                                                          - postgres_data:/var/lib/postgresql/data
                                                                                                                                                                                                                                                                                                                                - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
                                                                                                                                                                                                                                                                                                                                    networks:
                                                                                                                                                                                                                                                                                                                                          - sentinel_network
                                                                                                                                                                                                                                                                                                                                              healthcheck:
                                                                                                                                                                                                                                                                                                                                                    test: ["CMD-SHELL", "pg_isready -U sentinel -d cybersentinel"]
                                                                                                                                                                                                                                                                                                                                                          interval: 10s
                                                                                                                                                                                                                                                                                                                                                                timeout: 5s
                                                                                                                                                                                                                                                                                                                                                                      retries: 5
                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                        # ─────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                          # Redis (Cache + Task Queue)
                                                                                                                                                                                                                                                                                                                                                                            # ─────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                              redis:
                                                                                                                                                                                                                                                                                                                                                                                  image: redis:7-alpine
                                                                                                                                                                                                                                                                                                                                                                                      container_name: cybersentinel-redis
                                                                                                                                                                                                                                                                                                                                                                                          restart: unless-stopped
                                                                                                                                                                                                                                                                                                                                                                                              ports:
                                                                                                                                                                                                                                                                                                                                                                                                    - "6379:6379"
                                                                                                                                                                                                                                                                                                                                                                                                        command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
                                                                                                                                                                                                                                                                                                                                                                                                            volumes:
                                                                                                                                                                                                                                                                                                                                                                                                                  - redis_data:/data
                                                                                                                                                                                                                                                                                                                                                                                                                      networks:
                                                                                                                                                                                                                                                                                                                                                                                                                            - sentinel_network
                                                                                                                                                                                                                                                                                                                                                                                                                                healthcheck:
                                                                                                                                                                                                                                                                                                                                                                                                                                      test: ["CMD", "redis-cli", "ping"]
                                                                                                                                                                                                                                                                                                                                                                                                                                            interval: 10s
                                                                                                                                                                                                                                                                                                                                                                                                                                                  timeout: 5s
                                                                                                                                                                                                                                                                                                                                                                                                                                                        retries: 5
                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                          # ─────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                            # Elasticsearch (Log Storage + Search)
                                                                                                                                                                                                                                                                                                                                                                                                                                                              # ─────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                elasticsearch:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        container_name: cybersentinel-elasticsearch
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            restart: unless-stopped
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ports:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - "9200:9200"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          environment:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - discovery.type=single-node
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - xpack.security.enabled=false
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - ES_JAVA_OPTS=-Xms1g -Xmx1g
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                volumes:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - es_data:/usr/share/elasticsearch/data
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          networks:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - sentinel_network
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    healthcheck:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health"]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                interval: 30s
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      timeout: 10s
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            retries: 5
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # ─────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # Kafka (Event Streaming)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # ─────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    zookeeper:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        image: confluentinc/cp-zookeeper:7.6.0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            container_name: cybersentinel-zookeeper
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                environment:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ZOOKEEPER_CLIENT_PORT: 2181
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          networks:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - sentinel_network
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  kafka:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      image: confluentinc/cp-kafka:7.6.0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          container_name: cybersentinel-kafka
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              restart: unless-stopped
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ports:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - "9092:9092"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            depends_on:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - zookeeper
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      environment:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            KAFKA_BROKER_ID: 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        networks:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - sentinel_network
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # ─────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # Grafana (Metrics Dashboard)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    # ─────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      grafana:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          image: grafana/grafana:10.4.0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              container_name: cybersentinel-grafana
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  restart: unless-stopped
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ports:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - "3000:3000"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                environment:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-cybersentinel2026}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            GF_USERS_ALLOW_SIGN_UP: "false"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                volumes:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - grafana_data:/var/lib/grafana
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      depends_on:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - prometheus
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                networks:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - sentinel_network
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # ─────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # Prometheus (Metrics Collection)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # ─────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              prometheus:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  image: prom/prometheus:v2.51.0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      container_name: cybersentinel-prometheus
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          restart: unless-stopped
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ports:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - "9090:9090"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        volumes:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - prometheus_data:/prometheus
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        networks:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - sentinel_network
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # Volumes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              volumes:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                postgres_data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  redis_data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    es_data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      grafana_data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        prometheus_data:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          sentinel_logs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # Networks
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          networks:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            sentinel_network:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                driver: bridge
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ipam:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          config:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - subnet: 172.20.0.0/16
